name: Keep Render service alive

on:
  schedule:
    - cron: '*/5 * * * *'    # every 5 minutes (GitHub Actions minimum)
  workflow_dispatch:           # allow manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Wake the service
        run: curl --fail --silent --show-error --max-time 90 https://football-simulator-6rgn.onrender.com > /dev/null
